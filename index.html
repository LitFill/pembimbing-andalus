<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daftar Pembimbing Kamar</title>
    <link href="src/index.css" rel="stylesheet" />
  </head>

  <body>
    <div class="container">
      <header>
        <h1 class="page-title">Daftar Pembimbing Kamar</h1>
        <div class="stats-summary">
          <span id="totalPembimbing">0</span> Pembimbing
          <span id="totalKamar">0</span> Kamar
        </div>
      </header>

      <div class="search-container">
        <input
          type="text"
          id="searchInput"
          placeholder="Cari nama pembimbing atau nama kamar..."
          aria-label="Cari pembimbing"
        />

        <div
          class="view-switcher"
          role="radiogroup"
          aria-label="Pilih Tampilan"
        >
          <button
            id="showTable"
            class="view-btn active"
            aria-checked="true"
            role="radio"
          >
            <svg
              aria-hidden="true"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="square"
              stroke-linejoin="arcs"
            >
              <line x1="8" y1="6" x2="21" y2="6"></line>
              <line x1="8" y1="12" x2="21" y2="12"></line>
              <line x1="8" y1="18" x2="21" y2="18"></line>
              <line x1="3" y1="6" x2="3.01" y2="6"></line>
              <line x1="3" y1="12" x2="3.01" y2="12"></line>
              <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
            <span>Tabel</span>
          </button>
          <button
            id="showCard"
            class="view-btn"
            aria-checked="false"
            role="radio"
          >
            <svg
              aria-hidden="true"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="square"
              stroke-linejoin="arcs"
            >
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>Kartu</span>
          </button>
        </div>

        <select
          id="groupSelect"
          class="group-select"
          aria-label="Kelompokkan Data"
        >
          <option value="none">Tanpa Pengelompokan</option>
          <option value="category">Kategori Kamar</option>
        </select>
      </div>

      <div id="tableView" class="view-section active">
        <div class="table-responsive">
          <table id="dataTable">
            <thead>
              <tr>
                <th class="col-jabatan" scope="col">Tugas / Kamar</th>
                <th class="col-nama" scope="col">Nama Pembimbing</th>
              </tr>
            </thead>
            <tbody>
              <!-- Data HTML -->
            </tbody>
          </table>
        </div>
      </div>

      <div id="cardView" class="view-section">
        <div id="cardContainer" class="card-grid"></div>
      </div>

      <script src="src/data.js"></script>
      <script src="src/index.js"></script>
    </div>
  </body>
</html>
